trading:
  symbols:
    - "EURUSD"
    - "GBPUSD"
    - "USDJPY"
    - "XAUUSD"
    - "AUDUSD"
    - "USDCAD"
    - "USDCHF"
    - "NZDUSD"
  fallback_symbols:
    - "EURUSD"
    - "GBPUSD"
    - "USDJPY"
    - "XAUUSD"
  timeframe: "1h"
  higher_timeframe: "4h"
  mode: "paper"
  exchange: "mt5"
  fallback_exchange: "twelvedata"  # used automatically if MetaTrader5 is unavailable
  scan_interval: 60
  scan_batch:
    symbols_per_batch: 2
    interval_seconds: 60
    max_calls_per_minute: 8
    estimated_calls_per_symbol: 3
  session_filter: true    # NEW: only trade during London/NY volatility
  wait_for_bar_close: true # Prevent scalping by waiting for candle to finish

# ─── MetaTrader 5 Settings ─────────────────────────────────────────────────
mt5:
  lot_size: 0.01           # default lot size for orders
  deviation: 20            # max price deviation in points
  magic_number: 234000     # unique EA identifier for this bot
  order_type: "market"     # "market" | "limit"

risk:
  max_risk_per_trade: 0.015    # 1.5% of account balance per trade
  max_open_trades: 3
  max_same_quote_positions: 2  # portfolio allocator quote-currency cap
  max_trades_per_day: 5        # New: anti-overtrading limit
  max_daily_loss: 0.05         # 5% daily loss limit → bot pauses
  min_rr_ratio: 1.2            # minimum risk/reward to take trade
  atr_multiplier: 1.5          # ATR × this = stop-loss distance
  tp1_multiplier: 1.5          # TP1 = 1.5× the risk amount
  tp2_multiplier: 3.0          # TP2 = 3.0× the risk amount
  tp1_exit_pct: 0.5            # exit 50% at TP1, 50% at TP2

signals:
  min_confidence: 75           # minimum AI confidence score to act
  min_p_win: 0.55              # probabilistic floor after deterministic scoring
  require_confluence: true
  min_confluence_count: 3      # patterns + indicator signals needed
  executable_tiers: ["TIER_1", "TIER_2", "TIER_3"]  # deterministic pre-AI execution policy
  signal_cooldown_minutes: 15  # min wait between signals per symbol

# ─── Market Hours ──────────────────────────────────────────────────────────
market_hours:
  enforce_forex_close: true          # pause bot during weekend closure
  timezone: "America/New_York"       # Friday 5 PM → Sunday 5 PM in this TZ

# ─── AI Provider Configuration ─────────────────────────────────────────────
ai:
  primary_provider: "groq"       # "gemini" | "groq" | "claude"
  fallback_enabled: true
  
  gemini:
    model: "gemini-2.0-flash"
    temperature: 0.1
    max_tokens: 1000
    
  groq:
    model: "llama-3.3-70b-versatile"
    temperature: 0.1
    max_tokens: 1000

  claude: # Backwards compatibility
    model: "claude-sonnet-4-20250514"
    max_tokens: 1000
    temperature: 0.1

fundamental_analysis:
  enabled: true
  lookahead_hours: 4
  caution_flag_default: false
  weights:
    cb_bias: 0.35
    calendar: 0.25
    dxy: 0.20
    sentiment: 0.20
  sources:
    cb_bias:
      scrape_enabled: true
      scrape_url: "https://www.centralbanknews.info/"
      yaml_fallback_path: "data/fundamentals/cb_bias.yaml"
      cache_ttl_seconds: 21600
    calendar:
      finnhub_enabled: true
      scraping_enabled: true
      window_back_hours: 4
      window_forward_hours: 24
    dxy:
      stooq_url: "https://stooq.com/q/d/l/?s=dxy.f&i=d"
      cache_ttl_seconds: 3600
      proxy_symbol: "XAUUSD"
    sentiment:
      cnn_url: "https://production.dataviz.cnn.io/index/fearandgreed/graphdata"
      cache_ttl_seconds: 1800
      safe_haven_symbols: ["XAUUSD", "USDJPY", "USDCHF"]
  rating:
    approval_threshold: 0.30
    strong_threshold: 0.60
    moderate_threshold: 0.30

alerts:
  telegram_enabled: true
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"
  send_daily_summary: true
  daily_summary_hour: 23       # 23:00 local time

data:
  cache_dir: "data/cache"
  cache_expiry_hours: 4        # re-fetch if cache older than this
  historical_days: 365         # days of history for backtesting

logging:
  log_dir: "logs"
  log_file: "trading_bot.log"
  decision_trace_file: "logs/decision_trace.jsonl"
  max_bytes: 10485760          # 10 MB per log file
  backup_count: 5
  level: "INFO"

backtesting:
  start_date: "2024-01-01"
  end_date: "2025-12-31"
  initial_capital: 10000
  commission: 0.001            # 0.1% per trade (Binance maker/taker)
  report_dir: "backtest_reports"
  test_timeframes: ["5m", "15m", "30m", "1h"]

paper_trading:
  initial_balance: 10000       # virtual USDT balance

news:
  skip_high_impact: true
  news_buffer_minutes: 30      # pause trading N minutes before/after
  finnhub_enabled: false       # set true and add FINNHUB_API_KEY to .env

# ─── Optional Execution Bridge (FastAPI) ───────────────────────────────────
execution_bridge:
  enabled: true
  url: "http://0.0.0.0:10000"

calibration:
  symbols:
    XAUUSD:
      min_rr_ratio: 1.2
      executable_tiers: ["TIER_1", "TIER_2", "TIER_3"]
    EURUSD:
      min_rr_ratio: 1.2
      executable_tiers: ["TIER_1", "TIER_2", "TIER_3"]
ea_data:
  enabled: true
  stale_after_seconds: 600
  fallback_to_api: true
  api_fallback_symbols: ["EURUSD", "GBPUSD", "USDJPY", "XAUUSD"]
