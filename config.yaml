trading:
  symbols:
    - "EURUSD"
    - "GBPUSD"
    - "USDJPY"
  timeframe: "1h"
  higher_timeframe: "4h"
  mode: "paper"
  exchange: "mt5"
  fallback_exchange: "bybit"  # used automatically if MetaTrader5 is unavailable
  scan_interval: 60
  session_filter: true    # NEW: only trade during London/NY volatility
  wait_for_bar_close: true # Prevent scalping by waiting for candle to finish

# ─── MetaTrader 5 Settings ─────────────────────────────────────────────────
mt5:
  lot_size: 0.01           # default lot size for orders
  deviation: 20            # max price deviation in points
  magic_number: 234000     # unique EA identifier for this bot
  order_type: "market"     # "market" | "limit"

risk:
  max_risk_per_trade: 0.015    # 1.5% of account balance per trade
  max_open_trades: 3
  max_trades_per_day: 5        # New: anti-overtrading limit
  max_daily_loss: 0.05         # 5% daily loss limit → bot pauses
  min_rr_ratio: 1.5            # minimum risk/reward to take trade
  atr_multiplier: 1.5          # ATR × this = stop-loss distance
  tp1_multiplier: 1.5          # TP1 = 1.5× the risk amount
  tp2_multiplier: 3.0          # TP2 = 3.0× the risk amount
  tp1_exit_pct: 0.5            # exit 50% at TP1, 50% at TP2

signals:
  min_confidence: 75           # minimum AI confidence score to act
  require_confluence: true
  min_confluence_count: 3      # patterns + indicator signals needed
  signal_cooldown_minutes: 15  # min wait between signals per symbol

# ─── Market Hours ──────────────────────────────────────────────────────────
market_hours:
  enforce_forex_close: true          # pause bot during weekend closure
  timezone: "America/New_York"       # Friday 5 PM → Sunday 5 PM in this TZ

# ─── AI Provider Configuration ─────────────────────────────────────────────
ai:
  primary_provider: "groq"       # "gemini" | "groq" | "claude"
  fallback_enabled: true
  
  gemini:
    model: "gemini-2.0-flash"
    temperature: 0.1
    max_tokens: 1000
    
  groq:
    model: "llama-3.3-70b-versatile"
    temperature: 0.1
    max_tokens: 1000

  claude: # Backwards compatibility
    model: "claude-sonnet-4-20250514"
    max_tokens: 1000
    temperature: 0.1

alerts:
  telegram_enabled: true
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"
  send_daily_summary: true
  daily_summary_hour: 23       # 23:00 local time

data:
  cache_dir: "data/cache"
  cache_expiry_hours: 4        # re-fetch if cache older than this
  historical_days: 365         # days of history for backtesting

logging:
  log_dir: "logs"
  log_file: "trading_bot.log"
  max_bytes: 10485760          # 10 MB per log file
  backup_count: 5
  level: "INFO"

backtesting:
  start_date: "2024-01-01"
  end_date: "2025-12-31"
  initial_capital: 10000
  commission: 0.001            # 0.1% per trade (Binance maker/taker)
  report_dir: "backtest_reports"
  test_timeframes: ["5m", "15m", "30m", "1h"]

paper_trading:
  initial_balance: 10000       # virtual USDT balance

news:
  skip_high_impact: true
  news_buffer_minutes: 30      # pause trading N minutes before/after
  finnhub_enabled: false       # set true and add FINNHUB_API_KEY to .env
